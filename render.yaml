services:
  - type: web
    name: factugo
    runtime: node
    plan: free
    buildCommand: |
      cd client && npm install && npm run build
      cd ../server && npm install && npx prisma generate && npx tsc
    startCommand: |
      cd server && npx prisma db push --skip-generate && node dist/index.js
    envVars:
      - key: DATABASE_URL
        value: "file:./prod.db"
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
    healthCheckPath: /api/health
