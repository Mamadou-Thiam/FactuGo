services:
  - type: web
    name: factugo
    runtime: node
    plan: free
    buildCommand: |
      cd client && npm install --include=dev && npm run build
      cd ../server && npm install && node node_modules/prisma/build/index.js generate
    startCommand: |
      cd server && node node_modules/prisma/build/index.js db push --skip-generate && node_modules/.bin/tsx src/index.ts
    envVars:
      - key: DATABASE_URL
        value: "file:./prod.db"
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
    healthCheckPath: /api/health
